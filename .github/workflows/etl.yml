name: ETL Pipeline - Anime Tracker

on:
  schedule:
    # Chạy lúc 00:00 UTC mỗi ngày (= 7:00 AM +07:00)
    - cron: '0 0 * * *'
  
  # Cho phép trigger manual từ GitHub UI
  workflow_dispatch:

jobs:
  crawler:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python crawler.py
      
      - name: Notify success
        if: success()
        run: echo "✅ Crawler ran successfully at $(date)"
      
      - name: Notify failure
        if: failure()
        run: echo "❌ Crawler failed at $(date)"